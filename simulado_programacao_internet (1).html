<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado — Programação para Internet</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb;
    --blue: #185fa5;
    --blue-dark: #0c447c;
    --green-bg: #eaf3de;
    --green: #3b6d11;
    --red-bg: #fcebeb;
    --red: #a32d2d;
    --amber-bg: #faeeda;
    --amber: #854f0b;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #343432;
      --text: #f0efeb;
      --text2: #b4b2a9;
      --text3: #888780;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --blue-bg: #042c53;
      --blue: #85b7eb;
      --blue-dark: #b5d4f4;
      --green-bg: #173404;
      --green: #97c459;
      --red-bg: #501313;
      --red: #f09595;
      --amber-bg: #412402;
      --amber: #ef9f27;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container { max-width: 680px; margin: 0 auto; }

  .top-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .top-card h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .top-card p { font-size: 13px; color: var(--text2); }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--blue-bg);
    color: var(--blue);
    margin-top: 8px;
  }

  .progress-wrap { margin: 1rem 0 4px; }
  .progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; }
  .progress-fill { height: 4px; background: var(--blue); border-radius: 2px; width: 0%; transition: width 0.35s; }
  .progress-info { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin: 2rem 0 0.75rem;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }

  .q-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .q-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .q-text { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 1rem; }

  .code {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
    margin: 8px 0 14px;
    border: 0.5px solid var(--border);
  }

  .options { display: flex; flex-direction: column; gap: 7px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .opt:hover { background: var(--bg2); border-color: var(--border2); }
  .opt.selected { background: var(--blue-bg); border-color: var(--blue); }
  .opt.correct { background: var(--green-bg); border-color: var(--green); pointer-events: none; }
  .opt.wrong { background: var(--red-bg); border-color: var(--red); pointer-events: none; }
  .opt.reveal { background: var(--green-bg); border-color: var(--green); pointer-events: none; }
  .opt.locked { pointer-events: none; }

  .opt-letter { font-size: 13px; font-weight: 500; color: var(--text2); min-width: 16px; }
  .opt-text { font-size: 14px; color: var(--text); line-height: 1.5; }

  .feedback {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--green-bg); color: var(--green); }
  .feedback.err { background: var(--red-bg); color: var(--red); }

  /* discursivas */
  .disc-textarea {
    width: 100%;
    min-height: 90px;
    margin-top: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    resize: vertical;
  }
  .disc-textarea:focus { outline: none; border-color: var(--blue); }

  .gab-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg2);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    display: none;
  }
  .gab-box.show { display: block; }
  .gab-box strong { color: var(--blue); }

  /* botões */
  .btn {
    display: inline-block;
    padding: 8px 18px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    transition: background 0.12s;
    margin-top: 6px;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary {
    background: var(--blue);
    color: var(--blue-bg);
    border-color: var(--blue);
  }
  .btn-primary:hover { background: var(--blue-dark); }

  .nav-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.5rem; }

  /* resultado */
  .result-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
    display: none;
  }
  .result-card.show { display: block; }
  .result-score { font-size: 52px; font-weight: 500; color: var(--text); }
  .result-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .result-msg { font-size: 15px; color: var(--text); margin-top: 1rem; padding: 12px 16px; background: var(--bg2); border-radius: var(--radius-sm); }

  .temas-wrap { margin-top: 1.25rem; text-align: left; }
  .temas-wrap h3 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .tema-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 5px; }
  .tema-bar-bg { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; }
  .tema-bar-fill { height: 6px; border-radius: 3px; }
  .tema-label { min-width: 160px; color: var(--text); }
  .tema-pct { min-width: 36px; text-align: right; color: var(--text2); }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="top-card">
    <h1>Simulado — Programação para Internet</h1>
    <p>Aulas 1 a 6 &nbsp;·&nbsp; 8 objetivas + 2 discursivas &nbsp;·&nbsp; Questões sorteadas a cada acesso</p>
    <span class="badge">A cada novo acesso você recebe questões diferentes</span>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="progress-info" id="prog-info">0 de 8 objetivas respondidas</div>
    </div>
  </div>

  <div class="section-label">Parte I — questões objetivas</div>
  <div id="questoes-wrap"></div>

  <div class="section-label">Parte II — questões discursivas</div>
  <div id="disc-wrap"></div>

  <div class="nav-btns">
    <button class="btn btn-primary" onclick="verResultado()">Ver resultado</button>
    <button class="btn" onclick="novoSorteio()">Novo sorteio de questões</button>
  </div>

  <div class="result-card" id="result-card"></div>

</div>

<script>

  // --- AULA 2: Arquitetura cliente-servidor ---
  {

    gabarito: 1

  {

// SORTEIO E RENDERIZAÇÃO
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sortear() {
  // Garantir representação de temas: agrupa por tema e pega 1 de cada, completa aleatório
  const porTema = {};
  banco.forEach(q => {
    if (!porTema[q.tema]) porTema[q.tema] = [];
    porTema[q.tema].push(q);
  });
  let selecionadas = [];
  Object.values(porTema).forEach(qs => {
    selecionadas.push(shuffle(qs)[0]);
  });
  selecionadas = shuffle(selecionadas);
  if (selecionadas.length < 8) {
    const usadas = new Set(selecionadas);
    const extras = shuffle(banco.filter(q => !usadas.has(q)));
    selecionadas = [...selecionadas, ...extras].slice(0, 8);
  } else {
    selecionadas = selecionadas.slice(0, 8);
  }

  const disc = shuffle(bancoDisc).slice(0, 2);
  return { obj: selecionadas, disc };
}

let atual = sortear();
let respostas = new Array(8).fill(null);
let respondidas = 0;

function esc(s) {
  return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  respostas = new Array(8).fill(null);
  respondidas = 0;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('prog-info').textContent = '0 de 8 objetivas respondidas';
  document.getElementById('result-card').className = 'result-card';

  // Objetivas
  const wrap = document.getElementById('questoes-wrap');
  wrap.innerHTML = '';
  const letras = ['a','b','c','d'];
  atual.obj.forEach((q, qi) => {
    let html = `<div class="q-card" id="qcard${qi}">`;
    html += `<div class="q-num">Questão ${qi+1} &nbsp;·&nbsp; ${q.tema}</div>`;
    html += `<div class="q-text">${q.texto}</div>`;
    if (q.codigo) html += `<div class="code">${esc(q.codigo)}</div>`;
    html += `<div class="options">`;
    q.opcoes.forEach((op, oi) => {
      html += `<div class="opt" id="q${qi}o${oi}" onclick="responder(${qi},${oi})">
        <span class="opt-letter">${letras[oi]})</span>
        <span class="opt-text">${op}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<div class="feedback" id="fb${qi}"></div>`;
    html += `</div>`;
    wrap.innerHTML += html;
  });

  // Discursivas
  const dwrap = document.getElementById('disc-wrap');
  dwrap.innerHTML = '';
  atual.disc.forEach((d, di) => {
    let html = `<div class="q-card">`;
    html += `<div class="q-num">Questão ${di+9} &nbsp;·&nbsp; ${d.tema}</div>`;
    html += `<div class="q-text">${d.texto.replace(/\n/g,'<br>')}</div>`;
    if (d.codigo) html += `<div class="code">${esc(d.codigo)}</div>`;
    html += `<textarea class="disc-textarea" placeholder="Escreva sua resposta aqui..."></textarea>`;
    html += `<div><button class="btn" onclick="verGab(${di})">Ver resposta esperada</button></div>`;
    html += `<div class="gab-box" id="gab${di}"><strong>Resposta esperada:</strong><br><br>${d.gabarito.replace(/\n/g,'<br>')}</div>`;
    html += `</div>`;
    dwrap.innerHTML += html;
  });
}

function responder(qi, oi) {
  if (respostas[qi] !== null) return;
  respostas[qi] = oi;
  const q = atual.obj[qi];
  const acertou = oi === q.gabarito;

  // Travar todas as opções
  for (let i = 0; i < q.opcoes.length; i++) {
    const el = document.getElementById(`q${qi}o${i}`);
    el.classList.add('locked');
  }

  if (acertou) {
    document.getElementById(`q${qi}o${oi}`).className = 'opt correct';
  } else {
    document.getElementById(`q${qi}o${oi}`).className = 'opt wrong';
    document.getElementById(`q${qi}o${q.gabarito}`).className = 'opt reveal';
  }

  const fb = document.getElementById(`fb${qi}`);
  fb.className = 'feedback show ' + (acertou ? 'ok' : 'err');
  fb.textContent = acertou ? '✓ Correto!' : '✗ Incorreto. A resposta correta está destacada.';

  respondidas = respostas.filter(r => r !== null).length;
  document.getElementById('prog').style.width = (respondidas / 8 * 100) + '%';
  document.getElementById('prog-info').textContent = `${respondidas} de 8 objetivas respondidas`;
}

function verGab(di) {
  document.getElementById('gab' + di).className = 'gab-box show';
}

function verResultado() {
  if (respondidas < 8) {
    const faltam = 8 - respondidas;
    alert(`Você ainda tem ${faltam} questão(ões) sem resposta.`);
    return;
  }
  const acertos = respostas.filter((r, i) => r === atual.obj[i].gabarito).length;
  const pct = Math.round(acertos / 8 * 100);

  // Desempenho por tema
  const temaAcertos = {};
  const temaTotais = {};
  atual.obj.forEach((q, i) => {
    if (!temaTotais[q.tema]) { temaTotais[q.tema] = 0; temaAcertos[q.tema] = 0; }
    temaTotais[q.tema]++;
    if (respostas[i] === q.gabarito) temaAcertos[q.tema]++;
  });

  let msg = '';
  if (pct >= 87) msg = 'Excelente! Você está muito bem preparado para a prova.';
  else if (pct >= 62) msg = 'Bom desempenho! Revise os temas em que errou e refaça o simulado.';
  else msg = 'Recomenda-se revisar o conteúdo antes da prova. Tente novamente após estudar.';

  let temasHtml = '';
  Object.keys(temaTotais).forEach(tema => {
    const a = temaAcertos[tema];
    const t = temaTotais[tema];
    const p = Math.round(a / t * 100);
    const cor = p === 100 ? '#639922' : p >= 50 ? '#185fa5' : '#a32d2d';
    temasHtml += `<div class="tema-row">
      <span class="tema-label">${tema}</span>
      <div class="tema-bar-bg"><div class="tema-bar-fill" style="width:${p}%;background:${cor}"></div></div>
      <span class="tema-pct">${a}/${t}</span>
    </div>`;
  });

  const card = document.getElementById('result-card');
  card.className = 'result-card show';
  card.innerHTML = `
    <div class="result-score">${acertos}/8</div>
    <div class="result-sub">${pct}% de aproveitamento</div>
    <div class="result-msg">${msg}</div>
    <div class="temas-wrap">
      <h3>Desempenho por tema</h3>
      ${temasHtml}
    </div>
  `;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function novoSorteio() {
  atual = sortear();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
